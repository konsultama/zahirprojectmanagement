name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Prisma reads DATABASE_URL from the schema's datasource. The build, unit
    # tests and `prisma generate` never open a connection, so a dummy URL is
    # enough to satisfy schema parsing.
    env:
      DATABASE_URL: postgresql://ci@localhost:5432/ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @proj/api prisma:generate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
